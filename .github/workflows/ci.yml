name: Build and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-ci-${{ hashFiles('src/PasswordManager.Core/**/*.csproj', 'src/PasswordManager/**/*.csproj', 'tests/**/*.csproj') }}
          restore-keys: |
            nuget-ci-
            nuget-

      - name: Restore Core library
        run: dotnet restore src/PasswordManager.Core/PasswordManager.Core.csproj

      - name: Restore WPF application
        run: dotnet restore src/PasswordManager/PasswordManager.csproj

      - name: Restore Tests
        run: dotnet restore tests/PasswordManager.Tests/PasswordManager.Tests.csproj

      - name: Build Core library
        run: dotnet build src/PasswordManager.Core/PasswordManager.Core.csproj --no-restore

      - name: Build WPF application
        run: dotnet build src/PasswordManager/PasswordManager.csproj --no-restore

      - name: Build Tests
        run: dotnet build tests/PasswordManager.Tests/PasswordManager.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test tests/PasswordManager.Tests/PasswordManager.Tests.csproj --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
