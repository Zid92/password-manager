name: Build Windows

on:
  push:
    branches: [master, main]
    paths:
      - 'src/PasswordManager.Core/**'
      - 'src/PasswordManager.Maui/**'
      - '.github/workflows/windows.yml'
  workflow_dispatch:

jobs:
  build-windows-maui:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-windows-${{ hashFiles('src/PasswordManager.Maui/**/*.csproj', 'src/PasswordManager.Core/**/*.csproj') }}
          restore-keys: |
            nuget-windows-
            nuget-

      - name: Cache MAUI workload
        id: cache-maui
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\dotnet\sdk-manifests
            C:\Program Files\dotnet\packs
          key: maui-workload-${{ runner.os }}-${{ hashFiles('src/PasswordManager.Maui/PasswordManager.Maui.csproj') }}
          restore-keys: |
            maui-workload-${{ runner.os }}-

      - name: Install MAUI workload
        if: steps.cache-maui.outputs.cache-hit != 'true'
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore src/PasswordManager.Maui/PasswordManager.Maui.csproj

      - name: Build Windows MAUI (Debug)
        run: |
          dotnet publish src/PasswordManager.Maui/PasswordManager.Maui.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Debug `
            -o ./artifacts/windows-maui

      - name: Upload Windows MAUI Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-maui-debug
          path: ./artifacts/windows-maui/

  # WPF build disabled - available for local builds only
  # To build locally: dotnet publish src/PasswordManager/PasswordManager.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true
