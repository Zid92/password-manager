name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

  build-windows-wpf:
    needs: create-release
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/PasswordManager/PasswordManager.csproj

      - name: Publish Windows WPF
        run: |
          dotnet publish src/PasswordManager/PasswordManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o ./artifacts/windows-wpf

      - name: Zip artifacts
        run: Compress-Archive -Path ./artifacts/windows-wpf/* -DestinationPath ./PasswordManager-Windows-${{ github.ref_name }}.zip

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./PasswordManager-Windows-${{ github.ref_name }}.zip
          asset_name: PasswordManager-Windows-${{ github.ref_name }}.zip
          asset_content_type: application/zip

  build-android-release:
    needs: create-release
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore src/PasswordManager.Maui/PasswordManager.Maui.csproj

      - name: Build Android APK
        run: |
          dotnet publish src/PasswordManager.Maui/PasswordManager.Maui.csproj `
            -f net10.0-android `
            -c Release `
            -o ./artifacts/android

      - name: Find APK file
        id: find_apk
        run: |
          $apk = Get-ChildItem -Path ./artifacts/android -Filter "*.apk" -Recurse | Select-Object -First 1
          echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_OUTPUT
          echo "APK_NAME=$($apk.Name -replace '.apk', '-${{ github.ref_name }}.apk')" >> $env:GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.find_apk.outputs.APK_PATH }}
          asset_name: ${{ steps.find_apk.outputs.APK_NAME }}
          asset_content_type: application/vnd.android.package-archive
